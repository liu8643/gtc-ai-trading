name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install PyInstaller
        shell: pwsh
        run: |
          pip install pyinstaller

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --noconfirm --clean --onefile --windowed --name GTC_AI_Trading_System main.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GTC_AI_Trading_System_EXE
          path: dist/GTC_AI_Trading_System.exe
