name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Verify HTML parser dependencies
        shell: pwsh
        run: |
          python -c "import lxml, html5lib, bs4; print('R5N5 dependency check PASS: lxml/html5lib/bs4 installed')"

      - name: Build EXE
        shell: pwsh
        run: |
          pyinstaller --clean --noconfirm --onefile --console `
            --hidden-import xlrd `
            --hidden-import openpyxl `
            --hidden-import lxml `
            --hidden-import lxml.etree `
            --hidden-import lxml.html `
            --hidden-import html5lib `
            --hidden-import bs4 `
            --collect-submodules lxml `
            --collect-submodules html5lib `
            --collect-submodules bs4 `
            main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: GTC_EXE
          path: dist/*.exe
